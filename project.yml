name: Poser
options:
  bundleIdPrefix: com.poser
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0

schemes:
  Poser:
    build:
      targets:
        Poser: all
    test:
      targets:
        - PoserTests

targets:
  Poser:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Poser/Sources
        excludes: []
    info:
      path: Poser/Info.plist
      properties:
        # Empty dict opts the app into native full-screen rendering.
        # WITHOUT this, iOS letterboxes the app with black bars top & bottom.
        UILaunchScreen: {}
        # Required permission strings — the app crashes without these when
        # opening the camera or photo library.
        NSCameraUsageDescription: "Poser uses the camera to photograph poses for analysis."
        NSPhotoLibraryUsageDescription: "Poser accesses your photo library so you can choose a reference photo to analyze."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poser.app
        INFOPLIST_FILE: Poser/Info.plist
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []

  PoserTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PoserTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poser.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: Poser
      - package: SnapshotTesting
        product: SnapshotTesting
