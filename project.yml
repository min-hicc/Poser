name: Poser
options:
  bundleIdPrefix: com.poser
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Poser:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Poser/Sources
        excludes: []
    info:
      path: Poser/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poser.app
        INFOPLIST_FILE: Poser/Info.plist
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
